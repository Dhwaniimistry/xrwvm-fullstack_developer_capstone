<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="/">Dealerships</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
            <li class="nav-item active"><a class="nav-link" href="/contact">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

    <h1 class="text-center mb-4">Contact Us</h1>

    <p class="text-center">
        Have questions? Reach out to us anytime.
    </p>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <form>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Send Message</button>

            </form>

        </div>
    </div>

    <div class="text-center mt-4">
        <h5>Email:</h5>
        <p>support@dealerships.com</p>

        <h5>Phone:</h5>
        <p>+91 98765 43210</p>
    </div>

</div>

</body>
</html>
